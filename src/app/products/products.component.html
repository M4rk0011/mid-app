<div class="container mt-4">
  <div class="row">
    <div class="col-12">
      <div class="card" style="background-color: #1a1a1a; border: 2px solid #00bc8c; border-radius: 15px;">
        <div class="card-header" style="background-color: #00bc8c; color: white;">
          <h3 class="mb-0"><i class="bi bi-box-seam me-2"></i>Product List</h3>
        </div>
        <div class="card-body">
          
          <!-- Products Table -->
          <div class="table-responsive">
            <table class="table table-dark table-hover">
              <thead>
                <tr style="color: #00bc8c; border-bottom: 2px solid #00bc8c;">
                  <th style="color: white;">ID</th>
                  <th style="color: white;">Name</th>
                  <th style="color: white;">Category</th>
                  <th style="color: white;">Price</th>
                  <th style="color: white;">Stock</th>
                  <th style="color: white;">Status</th>
                  <th style="color: white;">Action</th>
                </tr>
              </thead>
              <tbody>
                @for (product of products; track product.id) {
                  <tr>
                    <td class="text-white">{{ product.id }}</td>
                    <td class="text-white">{{ product.name }}</td>
                    <td class="text-white">{{ product.category }}</td>
                    <td class="text-white">₱{{ product.price.toLocaleString() }}</td>
                    <td class="text-white">{{ product.stock }}</td>
                    <td>
                      <span class="badge" 
                            [style.background-color]="
                              product.status === 'Available' ? '#00bc8c' : 
                              product.status === 'Out of Stock' ? '#dc3545' : 
                              '#ffc107'
                            "
                            style="color: white; padding: 5px 10px;">
                        {{ product.status }}
                      </span>
                    </td>
                    <td>
                      <a [routerLink]="['/products', product.id]" class="btn btn-sm" 
                         style="background-color: #00bc8c; color: white; border: none;">
                        <i class="bi bi-eye me-1"></i> View
                      </a>
                    </td>
                  </tr>
                }
              </tbody>
            </table>
          </div>

        </div>
      </div>
    </div>
  </div>
</div>
