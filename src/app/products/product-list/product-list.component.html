<div class="container mt-4">
  <div class="card" style="background-color: #1a1a1a; border: 2px solid #00bc8c;">
    <div class="card-header bg-success text-white">
      <h3>Product List</h3>
    </div>
    <div class="card-body">
      <table class="table table-dark">
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Category</th>
            <th>Price</th>
            <th>Stock</th>
            <th>Status</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody>
          @for (product of products; track product.id) {
            <tr>
              <td>{{ product.id }}</td>
              <td>{{ product.name }}</td>
              <td>{{ product.category }}</td>
              <td>₱{{ product.price }}</td>
              <td>{{ product.stock }}</td>
              <td>{{ product.status }}</td>
              <td>
                <a [routerLink]="['/products', product.id]" class="btn btn-sm btn-success">
                  View
                </a>
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  </div>
</div>
